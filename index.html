<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calibration Tutorial | ICML 2026</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --text: #17202a;
      --muted: #586575;
      --accent: #0f766e;
      --panel: #ffffff;
      --border: #d7dde6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(720px, 100%);
      padding: 40px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 16px 40px rgb(23 32 42 / 8%);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3.4rem);
      line-height: 1.08;
    }

    p {
      margin: 20px 0 0;
      color: var(--muted);
      font-size: 1.1rem;
    }

    .presenters {
      margin-top: 28px;
      color: var(--text);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">ICML 2026 Tutorial</p>
    <h1>Calibration Tutorial</h1>
    <p>
      A placeholder site for the calibration tutorial by Aaron Roth,
      Natalie Collina, and Ira Globus-Harris.
    </p>
    <p class="presenters">More details coming soon.</p>
  </main>
</body>
</html>
